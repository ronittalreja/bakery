name: Email Processor Cron Job

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  process-emails:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
          
      - name: Install dependencies
        run: |
          cd backend
          npm install
          
      - name: Run email processor
        run: |
          cd backend
          node simpleEmailProcessor.js --test
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          TEST_SENDER_EMAIL: talrejaronit16@gmail.com
          NODE_ENV: production
          
      - name: Upload processed emails log
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: processed-emails-log
          path: backend/processed_emails.json
          retention-days: 30
